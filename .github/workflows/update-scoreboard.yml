name: Download ESPN Scoreboard

on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Create Data Folder
        run: mkdir -p data

      - name: Download JSON
        run: |
          curl -L \
          "https://site.api.espn.com/apis/site/v2/sports/football/college-football/scoreboard?seasontype=3&dates=2026&week=1" \
          -o data/scoreboard.json

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/scoreboard.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update scoreboard"
            git push
          fi
